name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build, and regression checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: API import boundary
        run: npm run verify:api-import-boundary

      - name: API handler bundle smoke
        run: npm run verify:api-handlers

      - name: Verify regression scripts
        run: npm run verify:all

      - name: Unit tests
        run: npm run test:unit

  integration:
    name: Supabase integration (optional)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        if: env.SUPABASE_URL != '' && env.TEST_USER_EMAIL != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npm run test:integration

      - name: Skip integration (secrets not configured)
        if: env.SUPABASE_URL == '' || env.TEST_USER_EMAIL == ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        run: echo "Skipping integration tests — add SUPABASE_* and TEST_USER_* repository secrets to enable."

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Playwright smoke tests
        run: npm run test:e2e:smoke

  e2e-api-health:
    name: Playwright API health (production)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: API health against production
        env:
          PLAYWRIGHT_API_BASE_URL: https://thehub-6426.vercel.app
        run: npx playwright test e2e/api-health.spec.ts --project=api-health
